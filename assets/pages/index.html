<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>atelier oda</title>
    <link rel="stylesheet" href="../css/index.min.css" />
    <link rel="stylesheet" href="../css/style.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#header-content").load("header.html", function () {
          const currentPage = window.location.pathname.split("/").pop();

          document.querySelectorAll(".nav-link").forEach((link) => {
            const linkPage = link.getAttribute("href").split("/").pop();
            if (linkPage === currentPage) {
              link.classList.add("active");
            } else {
              link.classList.remove("active");
            }
          });
        });

        $("#footer-content").load("footer.html", function () {});
      });
    </script>
  </head>
  <body>
    <div id="header-content"></div>

    <main>
      <!-------------------------->
      <!-- HERO section (START) -->
      <!-------------------------->
      <section class="hero">
        <!---------------------->
        <!-- Carousel (START) -->
        <!---------------------->
        <div id="carouselExampleFade" class="carousel slide carousel-fade">
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img
                src="../img/projects-images/VIL/villabe-vue-exterieure.jpg"
                class="d-block w-100"
                alt="Image du projet du Conservatoire de musique Yves Henry"
              />
            </div>
            <div class="carousel-item">
              <img
                src="../img/projects-images/HOS/HOS_O3.png"
                class="d-block w-100"
                alt="Image du projet d'une maison individuelle"
              />
            </div>
            <div class="carousel-item">
              <img
                src="../img/projects-images/CLU/cluny-perspective-exterieure.jpg"
                class="d-block w-100"
                alt="Image du projet de Centre social de la ville de Cluny"
              />
            </div>
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExampleFade"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExampleFade"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
        <!-------------------->
        <!-- Carousel (END) -->
        <!-------------------->

        <!--------------------------->
        <!-- Project title (START) -->
        <!--------------------------->
        <div class="hero__project-info-container">
          <p class="project__title">Conservatoire de musique Yves Henry</p>
          <p class="project__location">Villabé (91)</p>
        </div>
        <!--------------------------->
        <!-- Project title (START) -->
        <!--------------------------->
      </section>
      <!-------------------------->
      <!-- HERO section (END) -->
      <!-------------------------->

      <!-------------------------------->
      <!-- Project highlights (START) -->
      <!-------------------------------->
      <section class="projects-highlights">
        <!------------------------------>
        <!-- Portfolio button (START) -->
        <!------------------------------>
        <div class="projects-highlights__btn-container">
          <h4>MON PORTFOLIO</h4>
          <a href="#">
            <button class="btn-portfolio">
              Référence 2026 (PDF, 25.6 MB)
              <img
                class=""
                src="/assets/img/projects-images/align-bottom-svgrepo-com 1.svg"
              />
            </button>
          </a>
        </div>
        <!------------------------------>
        <!-- Portfolio button (END) -->
        <!------------------------------>
      </section>
      <section class="atelier-highlights">
        <div class="atelier-highlights__informations">
          <ul>
            <li class="informations-item"></li>
            <li class="informations-item"></li>
            <li class="informations-item"></li>
          </ul>
        </div>
        <div class="atelier-highlights__informations">
          <ul>
            <li class="informations-item"></li>
            <li class="informations-item"></li>
            <li class="informations-item"></li>
          </ul>
        </div>
        <div class="atelier-highlights__informations">
          <ul>
            <li class="informations-item"></li>
            <li class="informations-item"></li>
            <li class="informations-item"></li>
          </ul>
        </div>
        <a href="" class="atelier-highlights__link"></a>
      </section>
      <!------------------------------>
      <!-- Project highlights (END) -->
      <!------------------------------>
    </main>
    <div id="footer-content"></div>
  </body>
</html>
