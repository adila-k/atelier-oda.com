<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiche Projet | atelier oda - olivier duffé</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/assets/css/style.min.css" />
    <script type="module" src="/assets/js/fiche-projet.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      $(document).ready(function () {
        // header
        $("#header-content").load("header.html", function () {
          const currentPage = window.location.pathname.split("/").pop();
          document.querySelectorAll(".nav-link").forEach((link) => {
            const linkPage = link.getAttribute("href").split("/").pop();
            link.classList.toggle("active", linkPage === currentPage);
          });
        });

        // footer
        $("#footer-content").load("footer.html");

        // poids — setTimeout pour laisser les ressources se déclarer
        setTimeout(function () {
          const resources = performance.getEntriesByType("resource");
          const totalBytes = resources.reduce(
            (acc, r) => acc + (r.transferSize || 0),
            0,
          );
          const poids =
            totalBytes < 1024 * 1024
              ? (totalBytes / 1024).toFixed(1) + " Ko"
              : (totalBytes / 1024 / 1024).toFixed(2) + " Mo";

          $("#page-weight").text(poids);
        }, 1000);
      });
    </script>
  </head>
  <body>
    <div id="header-content"></div>
    <section class="fiche"></section>
    <div class="space"></div>
    <a class="backlink-to-full-page" href="/assets/pages/projets.html"
      >Revenir à l'ensemble des projets</a
    >
    <div class="page-weight-info">
      <span class="page-weight-info--text">Poids de la page : </span>
      <span id="page-weight"></span>
      <span class="page-weight-info--text info-bulle">
        Pourquoi cette information ?
        <span class="info-bulle__card">
          Comme en architecture, nous sommes attentifs à concevoir un numérique
          plus responsable.
        </span>
      </span>
    </div>

    <div id="footer-content"></div>
  </body>
</html>
