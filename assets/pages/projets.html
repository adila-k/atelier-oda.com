<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projets | atelier oda - olivier duffé</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/style.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#header-content").load("header.html", function () {
          const currentPage = window.location.pathname.split("/").pop();

          document.querySelectorAll(".nav-link").forEach((link) => {
            const linkPage = link.getAttribute("href").split("/").pop();
            if (linkPage === currentPage) {
              link.classList.add("active");
            } else {
              link.classList.remove("active");
            }
          });
        });

        $("#footer-content").load("footer.html", function () {});
      });
    </script>
  </head>
  <body>
    <div id="header-content"></div>
    <main>
      <h1>projets</h1>
      <div class="projects-grid container-fluid">
        <!--------------------------->
        <!-- PROJECTS GRID WITH JS -->
        <!--------------------------->
      </div>
    </main>
    <div id="footer-content"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../js/hover-mobile.js"></script>
    <script src="../js/projets.js"></script>
  </body>
</html>
